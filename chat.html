<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow rounded-4 w-100" style="max-width:400px; height:590px;">

    <!-- Header -->
    <div class="card-header bg-primary text-white text-center fw-bold rounded-top-4">
      CHAT APP
    </div>

    <!-- Chat Body -->
    <div class="card-body overflow-auto">

      <!-- Sent -->
      <div class="d-flex justify-content-end mb-3">
        <span class="bg-primary text-white p-2 rounded">
          you are my ❤️ : Abby
        </span>
      </div>

      <!-- Received -->
      <div class="d-flex mb-3">
        <span class="bg-light p-2 rounded">
          Jk: 0000
        </span>
      </div>

      <!-- Sent -->
      <div class="d-flex justify-content-end mb-3">
        <span class="bg-primary text-white p-2 rounded">
          ☺️☺️ : Abby
        </span>
      </div>

      <!-- Received -->
      <div class="d-flex mb-3">
        <span class="bg-light p-2 rounded">
          you are my Bee
        </span>
      </div>

      <!-- Sent -->
      <div class="d-flex justify-content-end mb-3">
        <span class="bg-primary text-white p-2 rounded">
          😂😂 : Abby
        </span>
      </div>

      <!-- Received -->
      <div class="d-flex mb-3">
        <span class="bg-light p-2 rounded">
          Jk: You got it right?
        </span>
      </div>

      <!-- Sent -->
      <div class="d-flex justify-content-end mb-3">
        <span class="bg-primary text-white p-2 rounded">
          yeah 😔 : Abby
        </span>
      </div>

      <!-- Received -->
      <div class="d-flex mb-3">
        <span class="bg-light p-2 rounded">
          Jk: 😘😍
        </span>
      </div>

    </div>

    <!-- Footer -->
    <div class="card-footer d-flex gap-2">
      <input type="text" class="form-control" placeholder="Type the message">
      <button class="btn btn-primary">Send</button>
    </div>

  </div>

</body>
</html>
