<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

.box {
  width: 50px;
  height: 50px;
  background-color: rgb(173, 174, 230);
  text-align: center;
  line-height: 60px;
}
.con1 {
  display: flex;
  flex-direction: row;
  gap: 10px;
}
.con2 {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.con3 {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.con3 .box {
  width: 100px;
}
.con4 {
  display: flex;
  justify-content: center;
  gap: 10px;
}
.con5 {
  display: flex;
  justify-content: space-between;
  
}
.con6 {
  display: flex;
  align-items: center;
  height: 150px;
  gap: 10px;
}
.btn {
  visibility: visible;
  background-color:brown ;
}

</style>
</head>
<body>
    <div class="con1">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>
<br>
<div class="con2">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
</div>
<br>
<div class="con3">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
  <div class="box">6</div>
</div>
<br>
<div class="con4">
  <div class="box" style="background-color:salmon;">1</div>
  <div class="box" style="background-color:salmon;">2</div>
  <div class="box" style="background-color:salmon;">3</div>
</div>
<br>
<div class="con5">
  <div class="box" style="background-color: deeppink;">1</div>
  <div class="box" style="background-color: deeppink;">2</div>
  <div class="box" style="background-color: deeppink;">3</div>
</div>
<br>
<div class="con6">
  <div class="box" style="height:50px ;background-color:chartreuse;">1</div>
  <div class="box" style="height:80px;background-color:chartreuse;">2</div>
  <div class="box" style="height:115px;background-color:chartreuse;">3</div>
</div>
<br>
<button class="btn">Click Me</button>
<br>
<br>
<div style="width:60px; height:60px; background-color:orange;">
  Inline Div
</div>
<br>
<span style="display:block; background-color:lightgreen; margin:5px;">
  Span 1
</span>
<span style="display:block; background-color:lightcoral; margin:5px;">
  Span 2
</span>
</body>
</html>
