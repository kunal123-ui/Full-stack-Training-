    <link rel="stylesheet" href="style.css">
    <style> 
            h1{
                color: rgb(100, 172, 18);

                font-weight: 700;
            }
    </style>
</head>
<body>
    <h1 style="color:blue; background-color:rgb(74, 70, 134)">hello</h1>
    <div>
        <h1 class="hi">welcome</h1>
        <h2 class="hi">to</h2>
       <span class="hi">hello world</span>
    </div>
    <div>
        <h1 class="h">welcome</h1>
        <h2 class="h">to</h2>
       <span class="h">hello world</span>
    </div>
    
</body>
