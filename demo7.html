<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.container{
width:400px;
padding:30px;
border:2px solid gray;
background-color:#eee;
border-radius:10px;
margin:auto;
margin-top:100px;
}

h1{
text-align:center;
color:blue;
}

.input-box{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
height:30px;
flex:1;
border-radius:5px;
padding-left:8px;
border:1px solid gray;
}

.b1{
height:30px;
background:blue;
color:white;
border-radius:5px;
border:none;
padding:0 10px;
cursor:pointer;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0;
}

.task-left{
display:flex;
align-items:center;
gap:10px;
}

.tick{
color:green;
font-size:18px;
}

.completed{
text-decoration: line-through;
color:gray;
}

.b2{
background:red;
color:white;
border:none;
border-radius:5px;
padding:5px 10px;
cursor:pointer;
}

hr{
border:0.5px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<div class="input-box">
<input type="text" placeholder="What needs to be done ?">
<button class="b1">Add Task</button>
</div>

<hr>

<div class="task">
<div class="task-left">
<i class="fa-solid fa-check tick"></i>
<span class="completed">Task A</span>
</div>
<button class="b2">Remove</button>
</div>

<hr>

<div class="task">
<div class="task-left">
<i class="fa-solid fa-check tick"></i>
<span>Task B</span>
</div>
<button class="b2">Remove</button>
</div>

<hr>

<div class="task">
<div class="task-left">
<i class="fa-solid fa-check tick"></i>
<span class="completed" >Task C</span>
</div>
<button class="b2">Remove</button>
</div>

<hr>

</div>

</body>
</html>
