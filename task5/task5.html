<!DOCTYPE html>
<html>
<head>
<style>
h1{
  text-align: center;
}
p{
  text-transform: uppercase;
  letter-spacing: 4px;
  color: red;
  text-decoration: underline;
}
.p1{
     text-decoration: underline;
     }
.p2{ 
    text-decoration: overline; 
}
.p3{ 
    text-decoration: line-through; 
}
.p4{ 
    text-decoration: none; 
}
.t1{ 
    text-transform: uppercase; 
}
.t2{
     text-transform: lowercase; 
    }
.t3{ 
    text-transform: capitalize; 
}
.t4{ 
    text-transform: none; 
}
p{
  background-color: yellow;
}
div{
  background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpOp_EuQi33o096heX_APWaf0jbFhryO_XHg&s");
  width: 200px;
  height: 200px;
}
.box{
  width: 300px;
  height: 150px;
  background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtZUtmcJrdm4riW0Wk4K9-R1El3OO7NRhPZg&s");
  background-size: cover;
  border: 2px solid black;

}
form{
  width: 400px;
  padding: 20px;
  border: 2px solid black;
  margin: 20px;
  background-color: lightgray;
}
input{
  width: 100%;
  margin: 5px 0;
}
.d1{ 
    border: 3px solid black;
 }
.d2{ 
    border: 3px dashed red; 
}
.d3{ 
    border: 3px dotted blue; 
}
.d4{ 
    border: 3px double green; 
}
div{
  padding: 10px;
  margin: 10px auto; 
  width: 200px;     
}
form{
  padding: 10px;
  margin: 10px auto; 
  width: 400px;  
}
</style>
</head>
<body>

<h1>Welcome</h1>
<p>This is a simple paragraph</p>
<p class="p1">Underline</p>
<p class="p2">Overline</p>
<p class="p3">Line Through</p>
<p class="p4">No Decoration</p>
<p class="t1">hello </p>
<p class="t2">HELLO </p>
<p class="t3">hello</p>
<p class="t4">Hello</p>
<div></div>
<br>
<br>
<div class="box"></div>
<br>
<form>
  Name:<br>
  <input type="text"><br>
  Email:<br>
  <input type="email"><br><br>
  <input type="submit">
  <br>
</form>
<div class="d1">Solid Border</div>
<div class="d2">Dashed Border</div>
<div class="d3">Dotted Border</div>
<div class="d4">Double Border</div>
</body>
</html>
