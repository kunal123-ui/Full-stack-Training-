<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
    
    display: flex;
    justify-content: center;
    align-items: center;
   background-color: #f7c948;
    font-family: Arial;
}

.calculator {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    height: 500px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.display {
    width: 290px;
    height: 50px;
    border: none;
    margin-bottom: 15px;
    text-align: right;
    font-size: 20px;
    padding: 10px;
    background: #eee;
    border-radius: 10px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 70px;
    width: 60px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    background: #cfe2f3;
}
.operator {
    background: #f7c948;
}
.clear {
    background: #ff5c5c;
    color: white;
}
.equal {
    grid-row: 5;
    grid-column: 2/5;
    background: #20c997;
    color: white;
}
    </style>
</head>
<body>
<div class="calculator">
    <input type="text" placeholder="0" class="display">
    <div class="buttons">
        <button class="operator">+</button>
        <button class="operator">-</button>
        <button class="operator">×</button>
        <button class="operator">÷</button>
        <button>9</button>
        <button>8</button>
        <button>7</button>
        <button>6</button>
        <button>5</button>
        <button>4</button>
        <button>3</button>
        <button>2</button>
        <button>1</button>
        <button>0</button>
        <button>.</button>
        <button class="clear">C</button>
       <button>AC</button> 
        <button class="equal">=</button>
    </div>
</div>

</body>
</html>
