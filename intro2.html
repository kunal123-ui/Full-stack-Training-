<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Intro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    background: #f5f5f5;
}

/* NAVBAR */
nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
}

.logo{
    font-size: 28px;
    font-weight: bold;
}

.logo span{
    color: #7b2ff7;
}

.nav-links{
    display: flex;
    gap: 30px;
}

.nav-links a{
    text-decoration: none;
    color: #555;
    font-weight: 500;
}

.nav-links a:hover{
    color: #7b2ff7;
}

.btn{
    background: linear-gradient(45deg,#7b2ff7,#9b59ff);
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

/* HERO SECTION */
.hero{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 80px;
}

.left{
    max-width: 500px;
}

.left h1{
    font-size: 40px;
    margin-bottom: 10px;
}

.left h1 span{
    color: #7b2ff7;
}

.left h2{
    margin-bottom: 15px;
    color: #444;
}

.left p{
    color: #666;
    margin-bottom: 20px;
}

.buttons{
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.btn-outline{
    background: transparent;
    border: 2px solid #7b2ff7;
    color: #7b2ff7;
}

/* SOCIAL ICONS */
.social{
    display: flex;
    gap: 15px;
}

.social i{
    border: 2px solid #7b2ff7;
    color: #7b2ff7;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* IMAGE */
.right img{
    width: 400px;
    border-radius: 10px;
    background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdQLwDqDwd2JfzifvfBTFT8I7iKFFevcedYg&s");
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo"><span>J</span>oe.</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Portfolio</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </div>

    <button class="btn">Let's Talk</button>
</nav>

<!-- HERO SECTION -->
<section class="hero">

    <!-- LEFT -->
    <div class="left">
        <h1>Hi, I'm <span>Joe Greyson</span></h1>
        <h2>Frontend Developer</h2>

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Inventore et officiis suscipit ut assumenda libero.
        </p>

        <div class="buttons">
            <button class="btn">Hire Me</button>
            <button class="btn btn-outline">See Projects</button>
        </div>

        <div class="social">
            <i class="fab fa-linkedin-in"></i>
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
        </div>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="right">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdQLwDqDwd2JfzifvfBTFT8I7iKFFevcedYg&s">
    </div>

</section>

</body>
</html>
