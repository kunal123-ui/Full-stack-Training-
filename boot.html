<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Boxes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #c23939;
    }

    .hover-box:hover {
      transform: scale(1.1);
      transition: 0.3s;
    }
    .glass {
      background: rgba(245, 242, 242, 0.2);
      backdrop-filter: blur(200px);
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="row g-4 text-center">
    <div class="col-md-4">
      <div class="p-4 bg-primary text-white rounded shadow">
        Normal Box
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 text-white rounded shadow"
           style="background: linear-gradient(45deg, #90bef0, #4403ac);">
        Gradient Box
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 border border-primary rounded">
        Outline Box
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 glass rounded shadow">
        Glass Box
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 bg-success text-white rounded shadow hover-box">
        Hover Box
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h5>Card Box</h5>
          <p>Simple design</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 border border-dark rounded shadow-lg">
        Shadow Box
      </div>
    </div>
    <div class="col-md-4 d-flex justify-content-center">
      <div class="d-flex align-items-center justify-content-center bg-warning rounded-circle shadow"
           style="width:100px; height:100px;">
        Circle
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-4 bg-dark text-white rounded shadow">
         Icon Box
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
