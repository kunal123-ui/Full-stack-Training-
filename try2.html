<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             margin: auto;
             padding: auto;
            font-family: Arial, Helvetica, sans-serif;
            
        }
        .continer{
            margin: 100px;
            padding: 20px;
           height: 700px;
           width: 800px;
           background-color: rgb(209, 201, 201);
           display: grid;
           grid-template-columns: repeat(3, 1fr)  ;
           gap: 10px;
           border-radius: 20px;
           gap: 20px ;
           grid-auto-flow: dense;
        }
        .box{
            display: flex;
    justify-content: center;
    align-items: center; 
    color: white;
    font-weight: bold;
     border-radius: 20px;
     
        }
       .box1{
         grid-column: 1;
    grid-row: 1 / 3;
       }
       .box2{
         grid-column: 3;
    grid-row: 3/ 5;
       }
       .box3{
         grid-row: 4;
    grid-column: 1/ 3;
       }
       .box4{
        grid-row: 1;
        grid-column: 2/4;
       }

    </style>
</head>
<body>
    <div class="continer">
        <div class="box box1" style="background-color: rgb(240, 51, 92);">box0</div>
        <div class="box box4" style="background-color: chocolate;">box1</div>
        <div class="box" style="background-color: rgb(31, 9, 156);">box2</div>
        <div class="box" style="background-color: rgb(110, 3, 96);">box3</div>
        <div class="box" style="background-color: rgb(124, 3, 3);">box4</div>
        <div class="box" style="background-color: rgb(128, 156, 4);">box5</div>
        <div class="box box3" style="background-color: rgb(20, 151, 190);">box6</div>
        <div class="box box2" style="background-color: rgb(228, 93, 4);">box7</div>
        
    </div>
</body>
</html>
