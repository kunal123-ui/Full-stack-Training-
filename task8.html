<!DOCTYPE html>
<html>
<head>
<title>Grid Layout</title>

<style>

body{
    background-color: aquamarine;
}

/* first row layout */
.row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

/* second row layout */
.row1{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
}

/* grid boxes */
.a{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    background-color: antiquewhite;
    padding:20px;
    gap:10px;
}

.b{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    background-color: antiquewhite;
    padding:20px;
    gap:10px;
}

.c{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    background-color: antiquewhite;
    padding:20px;
    gap:10px;
}

.d{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    background-color: antiquewhite;
    padding:20px;
    gap:10px;
}

/* image style */
img{
    width:100px;
    height:100px;
}

</style>
</head>

<body>

<div class="row">
    
    <div class="a">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
    </div>

    <div class="b">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
    </div>

</div>

<div class="row1">

    <div class="c">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
    </div>

    <div class="d">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
        <img src="https://th.bing.com/th/id/OIP.w6GkQ9OXzx2m9llQV_q6kgHaE7">
    </div>

</div>

</body>
</html>
